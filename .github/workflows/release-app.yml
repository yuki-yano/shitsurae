name: release-app

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing app tag to release (e.g. app-v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: release_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^app-v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "unexpected app tag format: ${TAG}" >&2
            exit 1
          fi

          printf 'value=%s\n' "${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag exists
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: git rev-parse --verify "${RELEASE_TAG}^{commit}" >/dev/null

      - name: Checkout release tag commit
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: git checkout --detach "${RELEASE_TAG}"

      - name: Resolve version
        id: app_version
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: |
          VERSION="${RELEASE_TAG#app-v}"
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"

          if [[ "${FILE_VERSION}" != "${VERSION}" ]]; then
            echo "VERSION file (${FILE_VERSION}) does not match release tag (${VERSION})" >&2
            exit 1
          fi

          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Run Swift tests
        run: env -u LIBRARY_PATH swift test

      - name: Build app release asset
        env:
          APP_VERSION: ${{ steps.app_version.outputs.value }}
          APP_BUILD_VERSION: ${{ steps.app_version.outputs.value }}
        run: ./Scripts/create-release-asset.sh

      - name: Upload GitHub release asset
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          files: Shitsurae.app.tar.gz
          overwrite_files: true
          generate_release_notes: true

      - name: Resolve cask metadata
        id: cask_metadata
        env:
          APP_VERSION: ${{ steps.app_version.outputs.value }}
        run: |
          SHA256="$(shasum -a 256 Shitsurae.app.tar.gz | awk '{ print $1 }')"

          printf 'version=%s\n' "${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          printf 'sha256=%s\n' "${SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Dispatch homebrew tap update
        env:
          DISPATCH_TOKEN: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
          TAP_REPOSITORY: yuki-yano/homebrew-shitsurae
          VERSION: ${{ steps.cask_metadata.outputs.version }}
          SHA256: ${{ steps.cask_metadata.outputs.sha256 }}
        run: |
          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_DISPATCH_TOKEN is required to update ${TAP_REPOSITORY}" >&2
            exit 1
          fi

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${TAP_REPOSITORY}/dispatches" \
            -d @- <<JSON
          {
            "event_type": "update-shitsurae-cask",
            "client_payload": {
              "version": "${VERSION}",
              "sha256": "${SHA256}"
            }
          }
          JSON
